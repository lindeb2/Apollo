name: apollo

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -p
      - "${DB_PORT:-5432}"
    environment:
      POSTGRES_DB: apollo
      POSTGRES_USER: apollo
      POSTGRES_PASSWORD: apollo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apollo -d apollo -p ${DB_PORT:-5432}"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data

  oidc-mock:
    image: ghcr.io/geigerzaehler/oidc-provider-mock:latest
    restart: unless-stopped
    command:
      - --port
      - "${OIDC_MOCK_PORT:-9400}"
      - --host
      - 0.0.0.0
      - --require-nonce
      - "true"
      - --user-claims
      - '{"sub":"alice@example.com","email":"alice@example.com","name":"Alice Apollo"}'
      - --user-claims
      - '{"sub":"bob@example.com","email":"bob@example.com","name":"Bob Apollo"}'
    ports:
      - "${OIDC_MOCK_PORT:-9400}:${OIDC_MOCK_PORT:-9400}"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; port = os.environ.get('OIDC_MOCK_PORT', '9400'); urllib.request.urlopen(f'http://localhost:{port}/.well-known/openid-configuration').read()"
      interval: 30s
      timeout: 3s
      retries: 10
    environment:
      OIDC_MOCK_PORT: "${OIDC_MOCK_PORT:-9400}"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: "${API_PORT:-8787}"
      DATABASE_URL: "${DATABASE_URL:-postgres://apollo:apollo@db:${DB_PORT:-5432}/apollo}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-change-this-access-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change-this-refresh-secret}"
      ACCESS_TOKEN_TTL: "${ACCESS_TOKEN_TTL:-15m}"
      REFRESH_TOKEN_TTL_DAYS: "${REFRESH_TOKEN_TTL_DAYS:-7}"
      DEFAULT_ADMIN_USERNAME: "${DEFAULT_ADMIN_USERNAME:-admin}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD:-changemechangeme}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      BOOTSTRAP_LOCAL_LOGIN_ENABLED: "${BOOTSTRAP_LOCAL_LOGIN_ENABLED:-true}"
      OIDC_MOCK_PORT: "${OIDC_MOCK_PORT:-9400}"
      OIDC_ISSUER: "${OIDC_ISSUER:-http://host.docker.internal:${OIDC_MOCK_PORT:-9400}}"
      OIDC_PUBLIC_ISSUER: "${OIDC_PUBLIC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${OIDC_POST_LOGOUT_REDIRECT_URI:-}"
      MEDIA_ROOT: "${MEDIA_ROOT:-/data/media}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-524288000}"
      RECORD_LOCK_TIMEOUT_SECONDS: "${RECORD_LOCK_TIMEOUT_SECONDS:-30}"
      CHECKPOINT_EVERY_OPS: "${CHECKPOINT_EVERY_OPS:-100}"
      CHECKPOINT_EVERY_SECONDS: "${CHECKPOINT_EVERY_SECONDS:-30}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "${API_PORT:-8787}"
    volumes:
      - ./server/media:${MEDIA_ROOT:-/data/media}

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      WEB_PORT: "${WEB_PORT:-3000}"
      WEB_LISTEN_HOST: "${WEB_LISTEN_HOST:-0.0.0.0}"
      VITE_USE_HTTPS: "${VITE_USE_HTTPS:-true}"
      API_PORT: "${API_PORT:-8787}"
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      - api

volumes:
  pgdata:
    name: apollo_pgdata
